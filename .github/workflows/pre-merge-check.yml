name: Pre-Merge Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  check-up-to-date:
    name: Branch up-to-date with main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check merge base
        run: |
          git fetch origin main
          HEAD=$(git rev-parse HEAD)
          MAIN=$(git rev-parse origin/main)

          if git merge-base --is-ancestor HEAD origin/main 2>/dev/null; then
            echo "✓ Branch is up-to-date or ahead of main"
          else
            echo "⚠ Branch is behind main. Consider rebasing: git rebase origin/main"
            echo "This is not a failure - you can still merge, but conflicts may occur."
          fi

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create virtualenv
        run: python -m venv .venv && echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install tools
        run: pip install black==26.3.1 ruff==0.15.8 isort==8.0.1

      - name: Check formatting (black)
        run: black --check src/

      - name: Check import order (isort)
        run: isort --check-only --profile black src/

      - name: Lint (ruff)
        run: ruff check src/

  e2e-smoke:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        run: python -m venv .venv && echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Build graph_core
        run: |
          pip install maturin
          cd graph-core
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 maturin develop

      - name: Install dependencies
        run: pip install -e "src[dev]"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Start server
        run: |
          cd src
          MESHWIKI_DATA_DIR=/tmp/meshwiki-smoke MESHWIKI_GRAPH_WATCH=false \
            python -m uvicorn meshwiki.main:app --host 127.0.0.1 --port 8080 &
          echo "Waiting for server..."
          sleep 5
          curl -sf http://127.0.0.1:8080/ || exit 1

      - name: Run E2E smoke tests
        run: |
          cd src
          pytest e2e/test_navigation.py -v \
            -k "TestTocSidebar or TestHeaderSearch" \
            --browser chromium
