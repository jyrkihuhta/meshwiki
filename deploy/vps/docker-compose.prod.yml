services:
  meshwiki:
    image: ghcr.io/jyrkihuhta/meshwiki:${MESHWIKI_VERSION:-latest}
    restart: unless-stopped
    volumes:
      - /opt/meshwiki/data/pages:/data/pages
    env_file: /opt/meshwiki/.env
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  meshwiki-staging:
    image: ghcr.io/jyrkihuhta/meshwiki:latest
    restart: unless-stopped
    volumes:
      - /opt/meshwiki/data/staging-pages:/data/pages
      - /opt/meshwiki/staging/src/meshwiki:/app/meshwiki:ro
    env_file: /opt/meshwiki/staging.env
    command:
      - uvicorn
      - meshwiki.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/meshwiki
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  orchestrator:
    image: ghcr.io/jyrkihuhta/meshwiki-orchestrator:${ORCHESTRATOR_VERSION:-latest}
    restart: unless-stopped
    volumes:
      - orchestrator_data:/data
    env_file: /opt/meshwiki/orchestrator.env
    expose:
      - "8001"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      meshwiki:
        condition: service_healthy

  orchestrator-staging:
    image: ghcr.io/jyrkihuhta/meshwiki-orchestrator:latest
    restart: unless-stopped
    volumes:
      - orchestrator_staging_data:/data
    env_file: /opt/meshwiki/orchestrator-staging.env
    expose:
      - "8002"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      meshwiki-staging:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - /opt/meshwiki/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - meshwiki

volumes:
  caddy_data:
  caddy_config:
  orchestrator_data:
  orchestrator_staging_data:
